openapi: 3.0.0
info:
  title: TechFix manager
  version: 1.0.0
  description: This is a API for management fix mobile devices.
servers:
  - url: https://api.example.com/v1

paths:
  /users/{userId}:
    post:
      summary: Returns a user by ID
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to return
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
        '400':
          description: The specified user ID is invalid (e.g. not a number)
        '404':
          description: A user with the specified ID was not found
  
  /users/:
    get:
      summary: return all users of plataform
      responses:
        '200':
          description: Successful
          content: 
            application/json:
              schema:
                type: object
                properties:
                  
                    id:
                      type: integer
                    name: 
                      type: string
                  
